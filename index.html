<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>31HATS | Verification</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Fondo optimizado */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('fondo.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: brightness(0.4);
            -webkit-filter: brightness(0.4);
        }

        /* Logo superior */
        .brand-logo {
            position: fixed;
            top: 30px;
            right: 25px;
            width: 80px; 
            height: auto;
            z-index: 100;
        }

        /* Contenedor de la gorra (Tamaño 85%) */
        .product-container {
            position: absolute;
            top: 40%; 
            left: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .product-img {
            width: 85%; 
            max-width: 400px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
            -webkit-filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }

        /* Panel inferior con desenfoque compatible */
        .bottom-container {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            width: 88%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); 
            border-radius: 25px;
            padding: 22px 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .seal-img {
            width: 70px;
            height: auto;
            margin-bottom: 12px;
            display: inline-block;
        }

        .scan-text {
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .btn-about {
            display: block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 800;
            padding: 12px 0;
            border-radius: 12px;
            width: 85%;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="background"></div>
    
    <img src="31hats.png" alt="Logo" class="brand-logo">

    <div class="product-container">
        <img src="gorra.jpeg" alt="Product" class="product-img">
    </div>

    <div class="bottom-container">
        <div class="auth-text">Authentic ThirtyOne<br>Product</div>
        
        <img src="logoo.png" alt="Certified" class="seal-img">
        
        <div class="scan-text">Scan Count: <span id="counter">1</span></div>
        
        <a href="#" class="btn-about">About ThirtyOne</a>
    </div>

    <script>
        function updateCounter() {
            // Clave actualizada a v99
            const STORAGE_KEY = 'v99';
            try {
                let count = localStorage.getItem(STORAGE_KEY);
                if (count === null) {
                    count = 1;
                } else {
                    count = parseInt(count) + 1;
                }
                localStorage.setItem(STORAGE_KEY, count);
                document.getElementById('counter').innerText = count;
            } catch (e) {
                console.warn("LocalStorage no disponible");
            }
        }
        
        window.onload = updateCounter;
    </script>

</body>
</html>
